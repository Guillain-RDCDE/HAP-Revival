name: Lint docs and links

on:
  pull_request:
    paths:
      - "**/*.md"
      - ".github/workflows/docs-lint.yml"
  push:
    branches: [main]
    paths:
      - "**/*.md"

jobs:
  markdownlint:
    name: markdownlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run markdownlint-cli2
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: |
            **/*.md
            !**/node_modules/**

  linkcheck:
    name: Check links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Link checker
        uses: lycheeverse/lychee-action@v1
        with:
          args: --no-progress --exclude-mail './**/*.md'
          fail: false   # link-check failures shouldn't block PRs — external sites die
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
